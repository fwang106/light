apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: meeting-transcription-api
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "10"
        run.googleapis.com/cpu-throttling: "false"
    spec:
      containerConcurrency: 10
      timeoutSeconds: 900
      serviceAccountName: meeting-api-sa@PROJECT_ID.iam.gserviceaccount.com
      containers:
        - image: gcr.io/PROJECT_ID/meeting-transcription-api:latest
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: "2"
              memory: 2Gi
          env:
            - name: ENVIRONMENT
              value: production
            - name: GCP_PROJECT_ID
              value: PROJECT_ID
            - name: FIREBASE_PROJECT_ID
              value: PROJECT_ID
            - name: FIREBASE_STORAGE_BUCKET
              value: PROJECT_ID.appspot.com
            - name: USE_SECRET_MANAGER
              value: "true"
            - name: ALLOWED_ORIGINS
              value: '["https://PROJECT_ID.web.app","https://PROJECT_ID.firebaseapp.com"]'
          # Service account provides ADC credentials - no key file needed
