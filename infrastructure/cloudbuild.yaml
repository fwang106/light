steps:
  # Build the backend Docker image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - -t
      - "gcr.io/$PROJECT_ID/meeting-transcription-api:$COMMIT_SHA"
      - -t
      - "gcr.io/$PROJECT_ID/meeting-transcription-api:latest"
      - ./backend
    dir: "."

  # Push to Container Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - "--all-tags"
      - "gcr.io/$PROJECT_ID/meeting-transcription-api"

  # Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - meeting-transcription-api
      - --image=gcr.io/$PROJECT_ID/meeting-transcription-api:$COMMIT_SHA
      - --region=us-central1
      - --platform=managed
      - --min-instances=1
      - --max-instances=10
      - --memory=2Gi
      - --cpu=2
      - --timeout=900
      - --concurrency=10
      - --set-env-vars=ENVIRONMENT=production,GCP_PROJECT_ID=$PROJECT_ID,FIREBASE_PROJECT_ID=$PROJECT_ID,USE_SECRET_MANAGER=true
      - --service-account=meeting-api-sa@$PROJECT_ID.iam.gserviceaccount.com
      - --allow-unauthenticated

  # Build frontend
  - name: "node:20"
    entrypoint: sh
    args:
      - -c
      - |
        cd frontend
        npm ci
        NEXT_PUBLIC_API_URL=https://$(gcloud run services describe meeting-transcription-api --region=us-central1 --format='value(status.url)') \
        NEXT_PUBLIC_FIREBASE_PROJECT_ID=$PROJECT_ID \
        npm run build

  # Deploy frontend to Firebase Hosting
  - name: "node:20"
    entrypoint: sh
    args:
      - -c
      - |
        npm install -g firebase-tools
        cd frontend
        firebase deploy --only hosting --project=$PROJECT_ID

images:
  - "gcr.io/$PROJECT_ID/meeting-transcription-api:$COMMIT_SHA"
  - "gcr.io/$PROJECT_ID/meeting-transcription-api:latest"

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
